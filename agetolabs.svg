<svg width="600" height="530" viewBox="0 0 600 530" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="44%" r="58%">
    <stop offset="0%" stop-color="#081d14"/>
    <stop offset="100%" stop-color="#020c08"/>
  </radialGradient>
  <radialGradient id="am" cx="50%" cy="50%" r="50%">
    <stop offset="0%"  stop-color="#00e8ac" stop-opacity=".22"/>
    <stop offset="65%" stop-color="#00c490" stop-opacity=".04"/>
    <stop offset="100%" stop-color="#00c490" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="badge" cx="36%" cy="32%" r="62%">
    <stop offset="0%" stop-color="#163328"/>
    <stop offset="100%" stop-color="#061510"/>
  </radialGradient>
  <linearGradient id="rim-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1db870"/>
    <stop offset="45%"  stop-color="#a2f0d5"/>
    <stop offset="100%" stop-color="#c99df8"/>
  </linearGradient>
  <linearGradient id="eg2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#a2f0d5" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#c99df8" stop-opacity=".7"/>
  </linearGradient>
  <linearGradient id="eg3" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1db870" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#c99df8" stop-opacity=".7"/>
  </linearGradient>
  <linearGradient id="eg1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1db870" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#a2f0d5" stop-opacity=".7"/>
  </linearGradient>
  <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#1db870"/>
    <stop offset="30%"  stop-color="#1db870"/>
    <stop offset="47%"  stop-color="#a2f0d5"/>
    <stop offset="58%"  stop-color="#a2f0d5"/>
    <stop offset="74%"  stop-color="#c99df8"/>
    <stop offset="100%" stop-color="#c99df8"/>
  </linearGradient>
  <filter id="ha-xl" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="32"/></filter>
  <filter id="ha-lg"  x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="16"/></filter>
  <filter id="ha-md"  x="-80%"  y="-80%"  width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="gw-e"   x="-50%"  y="-50%"  width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <filter id="gw-orb" x="-20%"  y="-60%"  width="140%" height="220%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <filter id="gw-node" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <filter id="gw-edge" x="-20%" y="-80%" width="140%" height="260%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <filter id="gw-badge" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
</defs>

<!-- Background -->
<rect width="600" height="530" fill="url(#bg)" rx="24"/>

<!-- Center: 300, 220 -->
<g transform="translate(300,220)">
  <circle r="180" fill="url(#am)"/>
  <circle r="165" fill="none" stroke="#00e8ac" stroke-width=".6" opacity=".12" stroke-dasharray="4 10"/>
  <circle r="178" fill="none" stroke="#00e8ac" stroke-width=".35" opacity=".06" stroke-dasharray="2 14"/>

  <!-- Orbitals -->
  <g transform="rotate(20)">
    <path d="M-152,0 A152,47 0 0 0 152,0"  fill="none" stroke="#004d35" stroke-width="1.5" opacity=".6"/>
    <path d="M152,0 A152,47 0 0 0 -152,0"  fill="none" stroke="#00e8ac" stroke-width="2.2" filter="url(#gw-orb)"/>
    <path d="M152,0 A152,47 0 0 0 -152,0"  fill="none" stroke="#00e8ac" stroke-width="8" opacity=".07" filter="url(#ha-md)"/>

    <g transform="rotate(60)">
      <path d="M-152,0 A152,47 0 0 0 152,0" fill="none" stroke="#0a3d22" stroke-width="1.5" opacity=".6"/>
      <path d="M152,0 A152,47 0 0 0 -152,0" fill="none" stroke="#1db870" stroke-width="2.2" filter="url(#gw-orb)"/>
      <path d="M152,0 A152,47 0 0 0 -152,0" fill="none" stroke="#1db870" stroke-width="8" opacity=".07" filter="url(#ha-md)"/>
    </g>

    <g transform="rotate(120)">
      <path d="M-152,0 A152,47 0 0 0 152,0" fill="none" stroke="#2a0a50" stroke-width="1.5" opacity=".6"/>
      <path d="M152,0 A152,47 0 0 0 -152,0" fill="none" stroke="#b06ef5" stroke-width="2.2" filter="url(#gw-orb)"/>
      <path d="M152,0 A152,47 0 0 0 -152,0" fill="none" stroke="#b06ef5" stroke-width="8" opacity=".07" filter="url(#ha-md)"/>
    </g>

    <!-- Electrons -->
    <circle cx="152" r="36" fill="#00e8ac" opacity=".04" filter="url(#ha-xl)"/>
    <circle cx="152" r="16" fill="#00e8ac" opacity=".14" filter="url(#ha-lg)"/>
    <circle cx="152" r="9"  fill="#00e8ac" opacity=".85" filter="url(#gw-e)"/>
    <circle cx="152" r="4"  fill="#d0fff2"/>

    <g transform="rotate(60)">
      <circle cx="152" r="36" fill="#1db870" opacity=".04" filter="url(#ha-xl)"/>
      <circle cx="152" r="16" fill="#1db870" opacity=".14" filter="url(#ha-lg)"/>
      <circle cx="152" r="9"  fill="#1db870" opacity=".85" filter="url(#gw-e)"/>
      <circle cx="152" r="4"  fill="#c8ffdf"/>
    </g>

    <g transform="rotate(120)">
      <circle cx="152" r="36" fill="#b06ef5" opacity=".04" filter="url(#ha-xl)"/>
      <circle cx="152" r="16" fill="#b06ef5" opacity=".14" filter="url(#ha-lg)"/>
      <circle cx="152" r="9"  fill="#b06ef5" opacity=".85" filter="url(#gw-e)"/>
      <circle cx="152" r="4"  fill="#ead0ff"/>
    </g>
  </g>

  <!-- Badge -->
  <circle r="88" fill="#00e8ac" opacity=".04" filter="url(#gw-badge)"/>
  <circle r="68" fill="url(#badge)"/>
  <circle r="68" fill="none" stroke="url(#rim-g)" stroke-width="2.8" opacity=".95"/>
  <circle r="57" fill="none" stroke="#00e8ac" stroke-width=".6" opacity=".2"/>

  <!-- Neural network (scaled 2.4x) -->
  <!-- Edges glow -->
  <g filter="url(#gw-edge)" opacity=".7">
    <line x1="0" y1="-34" x2="-27" y2="-7"  stroke="#1db870"   stroke-width="1.7"/>
    <line x1="0" y1="-34" x2="27"  y2="-7"  stroke="#c99df8"   stroke-width="1.7"/>
    <line x1="-27" y1="-7" x2="27" y2="-7"  stroke="#a2f0d5"   stroke-width="1.7"/>
    <line x1="-27" y1="-7" x2="-17" y2="27" stroke="#1db870"   stroke-width="1.7"/>
    <line x1="-27" y1="-7" x2="17"  y2="27" stroke="url(#eg2)" stroke-width="1.5"/>
    <line x1="27"  y1="-7" x2="-17" y2="27" stroke="url(#eg3)" stroke-width="1.5"/>
    <line x1="27"  y1="-7" x2="17"  y2="27" stroke="#c99df8"   stroke-width="1.7"/>
    <line x1="-17" y1="27" x2="17"  y2="27" stroke="url(#eg1)" stroke-width="1.5"/>
  </g>
  <!-- Edges sharp -->
  <line x1="0"   y1="-34" x2="-27" y2="-7"  stroke="#1db870"   stroke-width="1.6" opacity=".8"/>
  <line x1="0"   y1="-34" x2="27"  y2="-7"  stroke="#c99df8"   stroke-width="1.6" opacity=".8"/>
  <line x1="-27" y1="-7"  x2="27"  y2="-7"  stroke="#a2f0d5"   stroke-width="1.5" opacity=".7"/>
  <line x1="-27" y1="-7"  x2="-17" y2="27"  stroke="#1db870"   stroke-width="1.6" opacity=".8"/>
  <line x1="-27" y1="-7"  x2="17"  y2="27"  stroke="url(#eg2)" stroke-width="1.4" opacity=".7"/>
  <line x1="27"  y1="-7"  x2="-17" y2="27"  stroke="url(#eg3)" stroke-width="1.4" opacity=".7"/>
  <line x1="27"  y1="-7"  x2="17"  y2="27"  stroke="#c99df8"   stroke-width="1.6" opacity=".8"/>
  <line x1="-17" y1="27"  x2="17"  y2="27"  stroke="url(#eg1)" stroke-width="1.4" opacity=".7"/>

  <!-- Nodes -->
  <circle cx="0"   cy="-34" r="14" fill="#a2f0d5" opacity=".08" filter="url(#ha-md)"/>
  <circle cx="0"   cy="-34" r="8"  fill="#0d2820" stroke="#a2f0d5" stroke-width="2.2" filter="url(#gw-node)"/>
  <circle cx="0"   cy="-34" r="8"  fill="#0d2820" stroke="#a2f0d5" stroke-width="2.2"/>
  <circle cx="0"   cy="-34" r="3.2" fill="#a2f0d5"/>

  <circle cx="-27" cy="-7"  r="12" fill="#1db870" opacity=".08" filter="url(#ha-md)"/>
  <circle cx="-27" cy="-7"  r="7"  fill="#0a2018" stroke="#1db870" stroke-width="2" filter="url(#gw-node)"/>
  <circle cx="-27" cy="-7"  r="7"  fill="#0a2018" stroke="#1db870" stroke-width="2"/>
  <circle cx="-27" cy="-7"  r="2.8" fill="#1db870"/>

  <circle cx="27"  cy="-7"  r="12" fill="#c99df8" opacity=".08" filter="url(#ha-md)"/>
  <circle cx="27"  cy="-7"  r="7"  fill="#160d28" stroke="#c99df8" stroke-width="2" filter="url(#gw-node)"/>
  <circle cx="27"  cy="-7"  r="7"  fill="#160d28" stroke="#c99df8" stroke-width="2"/>
  <circle cx="27"  cy="-7"  r="2.8" fill="#c99df8"/>

  <circle cx="-17" cy="27"  r="12" fill="#1db870" opacity=".08" filter="url(#ha-md)"/>
  <circle cx="-17" cy="27"  r="7"  fill="#0a2018" stroke="#1db870" stroke-width="2" filter="url(#gw-node)"/>
  <circle cx="-17" cy="27"  r="7"  fill="#0a2018" stroke="#1db870" stroke-width="2"/>
  <circle cx="-17" cy="27"  r="2.8" fill="#1db870"/>

  <circle cx="17"  cy="27"  r="12" fill="#c99df8" opacity=".08" filter="url(#ha-md)"/>
  <circle cx="17"  cy="27"  r="7"  fill="#160d28" stroke="#c99df8" stroke-width="2" filter="url(#gw-node)"/>
  <circle cx="17"  cy="27"  r="7"  fill="#160d28" stroke="#c99df8" stroke-width="2"/>
  <circle cx="17"  cy="27"  r="2.8" fill="#c99df8"/>
</g>

<!-- Separator -->
<line x1="165" y1="435" x2="435" y2="435" stroke="url(#wm)" stroke-width=".7" opacity=".3"/>

<!-- Wordmark — double layer: glow + sharp using tspan coloring -->
<!-- Glow layer -->
<text x="300" y="465" text-anchor="middle"
  font-family="Arial,Helvetica,sans-serif"
  font-size="32" font-weight="300" letter-spacing="14"
  filter="url(#gw-orb)">
  <tspan fill="#1db870" opacity=".5">AGE</tspan><tspan fill="#a2f0d5" opacity=".5">TO</tspan><tspan fill="#c99df8" opacity=".5">LABS</tspan>
</text>
<!-- Sharp layer -->
<text x="300" y="465" text-anchor="middle"
  font-family="Arial,Helvetica,sans-serif"
  font-size="32" font-weight="300" letter-spacing="14">
  <tspan fill="#1db870">AGE</tspan><tspan fill="#a2f0d5">TO</tspan><tspan fill="#c99df8">LABS</tspan>
</text>

</svg>
